name: CI

on:
  push:
    branches: [main, "codex/**", "automation/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install locked environment
        run: python -m pip install -r requirements.lock
      - name: Install project without resolving dependencies
        run: python -m pip install -e . --no-deps
      - name: Check formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest -q
      - name: Validate example configuration
        run: >-
          python -c 'from pathlib import Path; from slp_model.config import AppConfig;
          AppConfig.load(Path("config.example.json"))'
      - name: Exercise offline status command
        run: slp status

  ci:
    name: ci
    if: always()
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every supported Python job to pass
        env:
          MATRIX_RESULT: ${{ needs.test.result }}
        run: |
          if [ "$MATRIX_RESULT" != "success" ]; then
            echo "Python test matrix result: $MATRIX_RESULT" >&2
            exit 1
          fi
