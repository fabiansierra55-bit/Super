name: SuperLotto production cycle

on:
  schedule:
    - cron: "30 20 * * 3,6"
      timezone: "America/Los_Angeles"
  workflow_dispatch:

# The production job overrides this only with the capabilities needed to
# publish an audited artifact PR, dispatch its CI, and report a failure.
permissions:
  contents: read

concurrency:
  group: superlotto-production-cycle
  cancel-in-progress: false

jobs:
  verify-score-generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 70
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    env:
      OUTPUT_DIR: workflow-output
    steps:
      - name: Check out production source
        id: checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize immutable run context
        id: context
        shell: bash
        run: |
          mkdir -p "$OUTPUT_DIR"
          python - <<'PY' | tee "$OUTPUT_DIR/run-context.json"
          import json
          import os
          from datetime import UTC, datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(UTC)
          pacific = now.astimezone(ZoneInfo("America/Los_Angeles"))
          context = {
              "draw_evening_date": pacific.date().isoformat(),
              "event_name": os.environ["GITHUB_EVENT_NAME"],
              "git_ref": os.environ["GITHUB_REF"],
              "git_sha": os.environ["GITHUB_SHA"],
              "repository": os.environ["GITHUB_REPOSITORY"],
              "run_attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
              "run_id": int(os.environ["GITHUB_RUN_ID"]),
              "started_timestamp_utc": now.isoformat().replace("+00:00", "Z"),
              "timezone": "America/Los_Angeles",
          }
          print(json.dumps(context, indent=2, sort_keys=True))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"draw_date={context['draw_evening_date']}\n")
          PY

      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install locked environment and production package
        id: install
        run: |
          python -m pip install -r requirements.lock
          python -m pip install -e . --no-deps

      - name: Create or resume the idempotent artifact branch
        id: branch
        shell: bash
        run: |
          branch="automation/slp-cycle-${{ steps.context.outputs.draw_date }}"
          git fetch origin main
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git fetch origin "refs/heads/$branch:refs/remotes/origin/$branch"
            git switch -C "$branch" "origin/$branch"
            scope_violations="$OUTPUT_DIR/reused-branch-scope-violations.txt"
            git diff --name-only -z origin/main...HEAD |
              while IFS= read -r -d '' path; do
                case "$path" in
                  data/*|reports/*) ;;
                  *) printf '%s\n' "$path" ;;
                esac
              done >"$scope_violations"
            if [ -s "$scope_violations" ]; then
              echo "Reused automation branch changes files outside data/ and reports/:" >&2
              sed 's/^/  - /' "$scope_violations" >&2
              exit 1
            fi
            git merge --no-edit origin/main
          else
            git switch -c "$branch" origin/main
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "name=$branch" >> "$GITHUB_OUTPUT"

      - name: Run fail-closed production cycle and report
        id: production
        continue-on-error: true
        timeout-minutes: 30
        shell: bash
        run: |
          set +e

          slp verify-latest >"$OUTPUT_DIR/verify-latest.stdout.json" 2>"$OUTPUT_DIR/verify-latest.stderr.log"
          verify_status=$?

          cycle_status=125
          if [ "$verify_status" -eq 0 ]; then
            slp cycle >"$OUTPUT_DIR/cycle.stdout.json" 2>"$OUTPUT_DIR/cycle.stderr.log"
            cycle_status=$?
          else
            echo "Skipped because result verification failed." >"$OUTPUT_DIR/cycle.stderr.log"
          fi

          slp audit >"$OUTPUT_DIR/audit.stdout.json" 2>"$OUTPUT_DIR/audit.stderr.log"
          audit_status=$?

          report_status=125
          if [ "$verify_status" -eq 0 ] && [ "$cycle_status" -eq 0 ] && [ "$audit_status" -eq 0 ]; then
            slp report >"$OUTPUT_DIR/report.stdout.json" 2>"$OUTPUT_DIR/report.stderr.log"
            report_status=$?
          else
            echo "Skipped because verification, cycle, or audit failed." >"$OUTPUT_DIR/report.stderr.log"
          fi

          export verify_status cycle_status audit_status report_status
          python - <<'PY' | tee "$OUTPUT_DIR/production-result.json"
          import json
          import os
          from datetime import UTC, datetime

          statuses = {
              name: int(os.environ[name])
              for name in ("verify_status", "cycle_status", "audit_status", "report_status")
          }
          result = {
              "audit_completed": statuses["audit_status"] == 0,
              "completed_timestamp_utc": datetime.now(UTC).isoformat().replace("+00:00", "Z"),
              "status": "success" if all(value == 0 for value in statuses.values()) else "failure",
              "subcommand_exit_codes": statuses,
          }
          print(json.dumps(result, indent=2, sort_keys=True))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"success={'true' if result['status'] == 'success' else 'false'}\n")
              output.write(f"audited={'true' if result['audit_completed'] else 'false'}\n")
          PY

          if [ "$verify_status" -ne 0 ] || [ "$cycle_status" -ne 0 ] || \
             [ "$audit_status" -ne 0 ] || [ "$report_status" -ne 0 ]; then
            exit 1
          fi

      - name: Commit and push approved generated artifacts
        if: >-
          steps.production.outputs.success == 'true' ||
          steps.production.outputs.audited == 'true'
        id: commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add -A -- data
          mode="partial-audit"
          if [ "${{ steps.production.outputs.success }}" = "true" ]; then
            mode="complete-cycle"
            if [ -d reports ]; then
              git add -A -- reports
            fi
          fi

          staged_violations="$OUTPUT_DIR/staged-scope-violations.txt"
          git diff --cached --name-only -z |
            while IFS= read -r -d '' path; do
              case "$path" in
                data/*|reports/*) ;;
                *) printf '%s\n' "$path" ;;
              esac
            done >"$staged_violations"
          if [ -s "$staged_violations" ]; then
            echo "Refusing to publish staged files outside data/ and reports/:" >&2
            sed 's/^/  - /' "$staged_violations" >&2
            exit 1
          fi

          changed=false
          if ! git diff --cached --quiet; then
            if [ "$mode" = "complete-cycle" ]; then
              message="Lock SuperLotto cycle artifacts ${{ steps.context.outputs.draw_date }}"
            else
              message="Preserve audited SuperLotto lifecycle evidence ${{ steps.context.outputs.draw_date }}"
            fi
            git commit -m "$message"
            changed=true
          fi

          head_sha="$(git rev-parse HEAD)"
          ahead_count="$(git rev-list --count origin/main..HEAD)"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          if [ "$ahead_count" -eq 0 ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch_violations="$OUTPUT_DIR/pre-push-branch-scope-violations.txt"
          git diff --name-only -z origin/main...HEAD |
            while IFS= read -r -d '' path; do
              case "$path" in
                data/*|reports/*) ;;
                *) printf '%s\n' "$path" ;;
              esac
            done >"$branch_violations"
          if [ -s "$branch_violations" ]; then
            echo "Refusing to push branch changes outside data/ and reports/:" >&2
            sed 's/^/  - /' "$branch_violations" >&2
            exit 1
          fi

          # Re-pushing and re-validating an existing ahead branch lets a retry
          # recover an open PR whose prior CI or auto-merge step was interrupted.
          gh auth setup-git
          git push -u origin "${{ steps.branch.outputs.name }}"
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Explicitly dispatch and require artifact-branch CI
        if: steps.commit.outputs.publish == 'true'
        id: artifact_ci
        timeout-minutes: 25
        shell: bash
        env:
          ARTIFACT_BRANCH: ${{ steps.branch.outputs.name }}
          ARTIFACT_SHA: ${{ steps.commit.outputs.head_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run ci.yml --ref "$ARTIFACT_BRANCH"

          run_id=""
          for attempt in $(seq 1 30); do
            run_id="$(
              gh run list \
                --workflow ci.yml \
                --branch "$ARTIFACT_BRANCH" \
                --event workflow_dispatch \
                --limit 20 \
                --json databaseId,createdAt,headSha \
                --jq ".[] | select(.headSha == \"$ARTIFACT_SHA\" and .createdAt >= \"$dispatched_at\") | .databaseId" \
                | head -n 1
            )"
            if [ -n "$run_id" ]; then
              break
            fi
            sleep 5
          done
          if [ -z "$run_id" ]; then
            echo "Could not identify dispatched CI run for $ARTIFACT_SHA" >&2
            exit 1
          fi

          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "ci_run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/$run_id" \
            >> "$GITHUB_OUTPUT"
          gh run watch "$run_id" --exit-status

      - name: Create or reuse the artifact pull request
        if: steps.commit.outputs.publish == 'true' && steps.artifact_ci.outcome == 'success'
        id: artifact_pr
        shell: bash
        env:
          ARTIFACT_BRANCH: ${{ steps.branch.outputs.name }}
          ARTIFACT_SHA: ${{ steps.commit.outputs.head_sha }}
          ARTIFACT_MODE: ${{ steps.commit.outputs.mode }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$ARTIFACT_MODE" = "complete-cycle" ]; then
            title="Lock SuperLotto cycle artifacts ${{ steps.context.outputs.draw_date }}"
            body="Automated two-source verification, date-matched scoring, recalibration, constraint validation, immutable next-bundle lock, audit, and report. Artifact-branch CI passed before publication. Lottery outcomes remain random; this workflow makes no guarantee of predictive performance."
          else
            title="Preserve audited SuperLotto lifecycle evidence ${{ steps.context.outputs.draw_date }}"
            body="The production cycle halted after preserving data-only evidence that passed the repository audit. No reports or unverified prediction artifacts were added by this partial publication. Artifact-branch CI passed before publication; the originating workflow remains failed and its incident remains open."
          fi
          existing="$(
            gh pr list \
              --state open \
              --head "$ARTIFACT_BRANCH" \
              --base main \
              --json number \
              --jq '.[0].number // empty'
          )"
          if [ -z "$existing" ]; then
            existing="$(
              gh pr list \
                --state all \
                --head "$ARTIFACT_BRANCH" \
                --base main \
                --json headRefOid,number \
                --jq ".[] | select(.headRefOid == \"$ARTIFACT_SHA\") | .number" \
                | head -n 1
            )"
          fi
          if [ -n "$existing" ]; then
            state="$(gh pr view "$existing" --json state --jq '.state')"
            if [ "$state" = "CLOSED" ]; then
              gh pr reopen "$existing"
              state="OPEN"
            fi
          else
            existing="$(
              gh pr create \
                --base main \
                --head "$ARTIFACT_BRANCH" \
                --title "$title" \
                --body "$body"
            )"
            existing="${existing##*/}"
            state="OPEN"
          fi
          if [ "$state" = "OPEN" ]; then
            gh pr edit "$existing" --title "$title" --body "$body"
          fi
          echo "number=$existing" >> "$GITHUB_OUTPUT"
          echo "state=$state" >> "$GITHUB_OUTPUT"
          echo "url=${{ github.server_url }}/${{ github.repository }}/pull/$existing" >> "$GITHUB_OUTPUT"

      - name: Enable merge only after explicit CI success
        if: >-
          steps.artifact_pr.outputs.number != '' &&
          steps.artifact_pr.outputs.state == 'OPEN' &&
          steps.artifact_ci.outcome == 'success'
        id: merge
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.artifact_pr.outputs.number }}" --auto --merge

      - name: Capture structured workflow state
        if: always()
        id: workflow_state
        shell: bash
        env:
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          SETUP_OUTCOME: ${{ steps.setup_python.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          BRANCH_OUTCOME: ${{ steps.branch.outcome }}
          PRODUCTION_OUTCOME: ${{ steps.production.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
          CI_OUTCOME: ${{ steps.artifact_ci.outcome }}
          PR_OUTCOME: ${{ steps.artifact_pr.outcome }}
          MERGE_OUTCOME: ${{ steps.merge.outcome }}
          PRODUCTION_AUDITED: ${{ steps.production.outputs.audited }}
          ARTIFACT_MODE: ${{ steps.commit.outputs.mode }}
          ARTIFACT_PUBLISH: ${{ steps.commit.outputs.publish }}
        run: |
          mkdir -p "$OUTPUT_DIR"
          python - <<'PY' | tee "$OUTPUT_DIR/workflow-state.json"
          import json
          import os
          from datetime import UTC, datetime

          names = (
              "CHECKOUT_OUTCOME",
              "SETUP_OUTCOME",
              "INSTALL_OUTCOME",
              "BRANCH_OUTCOME",
              "PRODUCTION_OUTCOME",
              "COMMIT_OUTCOME",
              "CI_OUTCOME",
              "PR_OUTCOME",
              "MERGE_OUTCOME",
              "PRODUCTION_AUDITED",
              "ARTIFACT_MODE",
              "ARTIFACT_PUBLISH",
          )
          state = {
              "captured_timestamp_utc": datetime.now(UTC).isoformat().replace("+00:00", "Z"),
              "step_outcomes": {name.lower(): os.environ.get(name, "") for name in names},
          }
          print(json.dumps(state, indent=2, sort_keys=True))
          PY

      - name: Upload complete cycle evidence
        if: always()
        id: evidence
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: slp-cycle-${{ steps.context.outputs.draw_date || 'unknown-date' }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 90
          include-hidden-files: true
          path: |
            workflow-output/
            data/
            reports/

      - name: Add failure summary and create or reuse incident issue
        if: >-
          always() &&
          (steps.checkout.outcome != 'success' ||
          steps.setup_python.outcome != 'success' ||
          steps.install.outcome != 'success' ||
          steps.branch.outcome != 'success' ||
          steps.production.outcome != 'success' ||
          steps.commit.outcome == 'failure' ||
          (steps.production.outputs.audited == 'true' &&
          steps.commit.outcome != 'success') ||
          (steps.commit.outputs.publish == 'true' &&
          (steps.artifact_ci.outcome != 'success' ||
          steps.artifact_pr.outcome != 'success' ||
          (steps.artifact_pr.outputs.state == 'OPEN' &&
          steps.merge.outcome != 'success'))) ||
          steps.workflow_state.outcome != 'success' ||
          steps.evidence.outcome != 'success')
        id: failure_issue
        shell: bash
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ steps.evidence.outputs.artifact-url }}
          ARTIFACT_PR_URL: ${{ steps.artifact_pr.outputs.url }}
          GH_TOKEN: ${{ github.token }}
        run: |
          title="[SLP automation] Production cycle failures"
          {
            echo "## SuperLotto production cycle halted"
            echo
            echo "The fail-closed workflow did not publish unverified artifacts."
            echo
            echo "- Draw evening: ${{ steps.context.outputs.draw_date || 'unknown' }}"
            echo "- Run: $RUN_URL"
            echo "- Evidence: ${ARTIFACT_URL:-unavailable}"
            echo "- Audited artifact PR: ${ARTIFACT_PR_URL:-none}"
            echo "- Audit completed: ${{ steps.production.outputs.audited || 'false' }}"
            echo "- Attempt: ${{ github.run_attempt }}"
            echo
            echo "Structured exit codes and stderr logs are in the uploaded workflow-output directory. Audited partial lifecycle evidence may have been published, but the failed cycle remains an open incident."
          } | tee "$OUTPUT_DIR/failure-issue.md" >> "$GITHUB_STEP_SUMMARY"

          existing="$(
            gh issue list \
              --state open \
              --search "\"$title\" in:title" \
              --json number,title \
              --jq '.[0].number // empty'
          )"
          if [ -z "$existing" ]; then
            gh issue create --title "$title" --body-file "$OUTPUT_DIR/failure-issue.md"
          else
            gh issue comment "$existing" --body-file "$OUTPUT_DIR/failure-issue.md"
          fi

      - name: Enforce overall workflow result
        if: always()
        shell: bash
        env:
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          SETUP_OUTCOME: ${{ steps.setup_python.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          BRANCH_OUTCOME: ${{ steps.branch.outcome }}
          PRODUCTION_OUTCOME: ${{ steps.production.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
          CI_OUTCOME: ${{ steps.artifact_ci.outcome }}
          PR_OUTCOME: ${{ steps.artifact_pr.outcome }}
          MERGE_OUTCOME: ${{ steps.merge.outcome }}
          EVIDENCE_OUTCOME: ${{ steps.evidence.outcome }}
          STATE_OUTCOME: ${{ steps.workflow_state.outcome }}
          ISSUE_OUTCOME: ${{ steps.failure_issue.outcome }}
          AUDITED: ${{ steps.production.outputs.audited }}
          PUBLISH: ${{ steps.commit.outputs.publish }}
          PR_STATE: ${{ steps.artifact_pr.outputs.state }}
        run: |
          required="$CHECKOUT_OUTCOME $SETUP_OUTCOME $INSTALL_OUTCOME $BRANCH_OUTCOME $PRODUCTION_OUTCOME"
          for outcome in $required; do
            if [ "$outcome" != "success" ]; then
              echo "Required production step failed or was skipped: $required" >&2
              exit 1
            fi
          done
          for outcome in "$COMMIT_OUTCOME" "$CI_OUTCOME" "$PR_OUTCOME" "$MERGE_OUTCOME"; do
            if [ "$outcome" = "failure" ]; then
              echo "Artifact publication step failed." >&2
              exit 1
            fi
          done
          if [ "$AUDITED" = "true" ] && [ "$COMMIT_OUTCOME" != "success" ]; then
            echo "Audited lifecycle evidence was not evaluated for publication." >&2
            exit 1
          fi
          if [ "$PUBLISH" = "true" ]; then
            if [ "$CI_OUTCOME" != "success" ] || [ "$PR_OUTCOME" != "success" ]; then
              echo "Ahead artifact branch did not pass CI and PR publication." >&2
              exit 1
            fi
            if [ "$PR_STATE" = "OPEN" ] && [ "$MERGE_OUTCOME" != "success" ]; then
              echo "Open artifact PR was not enrolled for merge." >&2
              exit 1
            fi
          fi
          if [ "$EVIDENCE_OUTCOME" != "success" ]; then
            echo "Cycle evidence was not uploaded." >&2
            exit 1
          fi
          if [ "$STATE_OUTCOME" != "success" ]; then
            echo "Structured workflow state was not captured." >&2
            exit 1
          fi
          if [ "$ISSUE_OUTCOME" = "failure" ]; then
            echo "Failure incident could not be recorded." >&2
            exit 1
          fi
